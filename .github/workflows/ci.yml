name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libncurses-dev gettext

    - name: Configure and build
      run: |
        autoreconf -fi || true
        ./configure
        make -j4

    - name: Run tests
      run: make check
