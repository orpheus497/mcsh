[general]
# pywal import: commented out — use ~/.config/alacritty/colors.toml or a local
# override file for colour theming (keeps config portable across machines)
# import = ["~/.cache/wal/colors-alacritty.toml"]

[terminal.shell]
program = "mcsh"

[window]
opacity = 0.9
padding = { x = 4, y = 4 }

[font]
size = 11.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam" }
