[general]
# Optional: create ~/.config/alacritty/colors.toml for local color overrides
# (e.g. generated by pywal). That file is not tracked in this repo.
# import = ["~/.config/alacritty/colors.toml"]

[terminal.shell]
program = "mcsh"

[window]
opacity = 0.9
padding = { x = 4, y = 4 }

[font]
size = 11.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam" }
