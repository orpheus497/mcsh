[general]
import = ["~/.cache/wal/colors-alacritty.toml"]

[terminal.shell]
program = "/usr/local/bin/mcsh"
args = ["-l"]

[window]
opacity = 0.9
padding = { x = 4, y = 4 }

[font]
size = 11.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam" }
